# This is a Databricks asset bundle definition for demo.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: demo
  uuid: 7dc1ac54-7bb8-4350-8ace-b56099b258f5

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-1515176412793628.8.azuredatabricks.net
    variables:
      catalog: level1
      schema: dev
    presets:
      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://adb-1515176412793628.8.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/santosh@santoshinbcgmail.onmicrosoft.com to make sure we only have a single copy.
      root_path: /Workspace/Users/santosh@santoshinbcgmail.onmicrosoft.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: level1
      schema: prod
    permissions:
      - user_name: santosh@santoshinbcgmail.onmicrosoft.com
        level: CAN_MANAGE
